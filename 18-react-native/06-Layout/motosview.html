<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Motocicletas</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&family=Racing+Sans+One&display=swap" rel="stylesheet" />
</head>
<body class="page-motos">

  <div class="desktop-bg"></div>

  <div class="phone-frame">

    <div class="dynamic-island">
      <div class="island-camera"></div>
      <div class="island-speaker"></div>
    </div>

    <div class="phone-screen">

      <!-- Fondo fibra de carbono -->
      <div class="background">
        <img src="img/Fondo.png" alt="img" />
      </div>
      <div class="overlay"></div>

      <!-- Top bar -->
      <div class="top-bar">
        <button class="icon-btn" onclick="history.back()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <button class="icon-btn" onclick="openModal()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </button>
      </div>

      <!-- Lista de motos -->
      <div class="scroll-area">

        <a href="detailmoto.html" class="moto-card">
          <div class="moto-img-wrap">
            <img src="img/H2V4236.jpg" alt="Africa Twin" class="moto-img" />
            <button class="btn-view">View</button>
          </div>
        </a>

        <a href="detailmoto.html" class="moto-card">
          <div class="moto-img-wrap">
            <img src="img/xre300.jpg" alt="XRE300" class="moto-img" />
            <button class="btn-view">View</button>
          </div>
        </a>

        <a href="detailmoto.html" class="moto-card">
          <div class="moto-img-wrap">
            <img src="img/honda-cb650r-2024-30_7_1200x690.jpeg" alt="CB650R" class="moto-img" />
            <button class="btn-view">View</button>
          </div>
        </a>

        <a href="detailmoto.html" class="moto-card">
          <div class="moto-img-wrap">
            <img src="img/honda-cbr-1000-rr-r-fireblade-sp.jpg" alt="CBR Fireblade" class="moto-img" />
            <button class="btn-view">View</button>
          </div>
        </a>

        <div style="height: 48px;"></div>

      </div>
      <!-- 
  MODAL CREAR MOTO
  Pega este bloque dentro de .phone-screen en motos.html,
  justo antes del drawer-backdrop
-->

<!-- ── MODAL CREAR MOTO ── -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()"></div>

<div class="modal" id="modal">

  <div class="modal-header">
    <span class="modal-title">NUEVA MOTO</span>
    <button class="icon-btn" onclick="closeModal()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="modal-body">

    <!-- Foto de la moto -->
    <div class="modal-avatar-wrap">
      <div class="modal-avatar-frame modal-avatar-frame--moto">
        <img src="" alt="" class="modal-avatar-preview" id="motoImgPreview" style="display:none;" />
        <label class="modal-avatar-overlay modal-avatar-overlay--visible" for="motoImgInput" id="motoImgLabel">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>Agregar foto</span>
        </label>
        <input type="file" id="motoImgInput" accept="image/*" style="display:none" onchange="previewMotoImg(this)" />
      </div>
    </div>

    <!-- Nombre -->
    <div class="modal-field">
      <label class="modal-label">Nombre</label>
      <input type="text" class="modal-input" id="moto-nombre" placeholder="Africa Twin CRF 1100L" />
    </div>

    <!-- Modelo -->
    <div class="modal-field">
      <label class="modal-label">Modelo</label>
      <input type="text" class="modal-input" id="moto-modelo" placeholder="Modelo 2026" />
    </div>

    <!-- Color -->
    <div class="modal-field">
      <label class="modal-label">Color</label>
      <input type="text" class="modal-input" id="moto-color" placeholder="Color blanco" />
    </div>

    <!-- Categoría -->
    <div class="modal-field">
      <label class="modal-label">Categoría</label>
      <select class="modal-input modal-select" id="moto-categoria">
        <option value="" disabled selected>Seleccionar...</option>
        <option value="adventure">Adventure</option>
        <option value="supersport">Super sport</option>
        <option value="sport">Sport</option>
        <option value="todoterreno">Todo terreno</option>
        <option value="scooter">Scooter</option>
        <option value="enduro">Enduro y motocross</option>
      </select>
    </div>

  </div>

  <div class="modal-footer">
    <button class="btn-cancel" onclick="closeModal()">CANCELAR</button>
    <button class="btn-save" onclick="saveMoto()">READY</button>
  </div>

</div>

      <!-- ── Menú hamburguesa (drawer) ── -->
      <div class="drawer-backdrop" id="drawerBackdrop" onclick="closeMenu()"></div>

      <div class="drawer" id="drawer">
 
        <div class="drawer-header">
          <img src="img/logo_honda-removebg-preview.png" alt="Honda" class="drawer-logo" />
        </div>
 
        <nav class="drawer-nav">
 
          <a href="dashboard.html" class="drawer-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M219.31,108.68l-80-80a16,16,0,0,0-22.62,0l-80,80A15.87,15.87,0,0,0,32,120v96a8,8,0,0,0,8,8h64a8,8,0,0,0,8-8V160h32v56a8,8,0,0,0,8,8h64a8,8,0,0,0,8-8V120A15.87,15.87,0,0,0,219.31,108.68ZM208,208H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48V120l80-80,80,80Z"></path></svg>
            <span>INICIO</span>
          </a>
 
          <div class="drawer-item drawer-item--toggle" onclick="toggleSubmenu()">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M216,120a41,41,0,0,0-6.6.55l-5.82-15.14A55.64,55.64,0,0,1,216,104a8,8,0,0,0,0-16H196.88L183.47,53.13A8,8,0,0,0,176,48H144a8,8,0,0,0,0,16h26.51l9.23,24H152c-18.5,0-33.5,4.31-43.37,12.46a16,16,0,0,1-16.76,2.07C81.29,97.72,31.13,77.33,26.71,75.6L21,73.36A17.74,17.74,0,0,0,16,72a8,8,0,0,0-2.87,15.46h0c.46.18,47.19,18.3,72.13,29.63a32.15,32.15,0,0,0,33.56-4.29c4.86-4,14.57-8.8,33.19-8.8h18.82a71.74,71.74,0,0,0-24.17,36.59A15.86,15.86,0,0,1,131.32,152H79.2a40,40,0,1,0,0,16h52.12a31.91,31.91,0,0,0,30.74-23.1,56,56,0,0,1,26.59-33.72l5.82,15.13A40,40,0,1,0,216,120ZM40,168H62.62a24,24,0,1,1,0-16H40a8,8,0,0,0,0,16Zm176,16a24,24,0,0,1-15.58-42.23l8.11,21.1a8,8,0,1,0,14.94-5.74L215.35,136l.65,0a24,24,0,0,1,0,48Z"></path></svg>
            <span>MOTOCICLETAS</span>
            <svg class="chevron" id="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
 
          <div class="submenu" id="submenu">
            <a href="motosview.html" class="submenu-item">Super sport</a>
            <a href="motosview.html" class="submenu-item">Sport</a>
            <a href="motosview.html" class="submenu-item">Todo terreno</a>
            <a href="motosview.html" class="submenu-item">Scooter</a>
            <a href="motosview.html" class="submenu-item">Enduro y motocross</a>
            <a href="motosview.html" class="submenu-item">Aventura</a>
          </div>
 
        </nav>
 
        <div class="drawer-footer">
          <a href="profile.html" class="drawer-user">
            <div class="drawer-avatar">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <span class="drawer-username">Luis Muñoz</span>
          </a>
          <a href="index.html" class="drawer-logout">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </a>
        </div>
 
      </div>
 
      <!-- Navbar inferior -->
      <nav class="bottom-nav">
        <button class="nav-hamburger" onclick="openMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </nav>

    </div>

    <div class="btn-volume-up"></div>
    <div class="btn-volume-down"></div>
    <div class="btn-power"></div>
  </div>

  <script>
    function openMenu() {
      document.getElementById('drawer').classList.add('drawer--open');
      document.getElementById('drawerBackdrop').classList.add('drawer-backdrop--show');
    }
    function closeMenu() {
      document.getElementById('drawer').classList.remove('drawer--open');
      document.getElementById('drawerBackdrop').classList.remove('drawer-backdrop--show');
      document.getElementById('submenu').classList.remove('submenu--open');
      document.getElementById('chevron').classList.remove('chevron--open');
    }
    function toggleSubmenu() {
      document.getElementById('submenu').classList.toggle('submenu--open');
      document.getElementById('chevron').classList.toggle('chevron--open');
    }



function openModal() {
  document.getElementById('modal').classList.add('modal--open');
  document.getElementById('modalBackdrop').classList.add('modal-backdrop--show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('modal--open');
  document.getElementById('modalBackdrop').classList.remove('modal-backdrop--show');
}

function previewMotoImg(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const preview = document.getElementById('motoImgPreview');
      const label   = document.getElementById('motoImgLabel');
      preview.src = e.target.result;
      preview.style.display = 'block';
      // Quita la clase visible para que el overlay solo aparezca en hover
      label.classList.remove('modal-avatar-overlay--visible');
    };
    reader.readAsDataURL(input.files[0]);
  }
}


  </script>

</body>
</html>
