<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&family=Racing+Sans+One&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="desktop-bg"></div>

  <div class="phone-frame">
    <!-- Isla dinámica -->
    <div class="dynamic-island">
      <div class="island-camera"></div>
      <div class="island-speaker"></div>
    </div>

    <div class="phone-screen">
      <div class="background">
        <img src="img/Fondo.png" alt="img" />
      </div>

      <div class="overlay"></div>

      <div class="screen">

        <!-- Flecha atrás -->
        <div class="back-bar">
          <a href="index.html" class="icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </a>
        </div>
        <!-- Logo Honda -->
        <div class="logo-area">
          <div class="logo-wing">
            <!-- Ala Honda SVG -->
          </div>
          <img src="img/logo_honda-removebg-preview.png" alt="" />
        </div>

        <!-- Formulario -->
        <div class="form-area" >
          <div class="field-group">
            <label class="field-label">Name</label>
            <input type="text" class="field-input" placeholder="" />
          </div>

          <div class="field-group">
            <label class="field-label">E-mail</label>
            <input type="email" class="field-input" placeholder="" />
          </div>

          <div class="field-group">
            <label class="field-label">Password</label>
            <input type="password" class="field-input" placeholder="" />
          </div>

          <div class="field-group">
            <label class="field-label">Confirm password</label>
            <input type="password" class="field-input" placeholder="" />
          </div>

          <p class="already-text">Already of adventure?</p>

          <button class="btn-ready" onclick="window.location.href='index.html'">READY</button>
        </div>

        <div class="spacer"></div>

      </div>
    </div>

    <div class="btn-volume-up"></div>
    <div class="btn-volume-down"></div>
    <div class="btn-power"></div>
  </div>
</body>

</html>
