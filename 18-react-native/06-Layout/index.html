<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&family=Racing+Sans+One&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="desktop-bg"></div>

    <div class="phone-frame">
      <!-- Isla dinámica estilo Apple -->
      <div class="dynamic-island">
        <div class="island-camera"></div>
        <div class="island-speaker"></div>
      </div>

      <div class="phone-screen">
        <div class="background">
          <video autoplay muted loop playsinline>
            <source src="img/Login.mp4" type="video/mp4" />
          </video>
        </div>

        <div class="overlay"></div>

        <div class="screen">
          <a href="register.html" class="header" >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              fill="#fff"
              viewBox="0 0 256 256"
            >
              <path
                d="M168,56a8,8,0,0,1,8-8h16V32a8,8,0,0,1,16,0V48h16a8,8,0,0,1,0,16H208V80a8,8,0,0,1-16,0V64H176A8,8,0,0,1,168,56Zm62.56,54.68a103.92,103.92,0,1,1-85.24-85.24,8,8,0,0,1-2.64,15.78A88.07,88.07,0,0,0,40,128a87.62,87.62,0,0,0,22.24,58.41A79.66,79.66,0,0,1,98.3,157.66a48,48,0,1,1,59.4,0,79.66,79.66,0,0,1,36.06,28.75A87.62,87.62,0,0,0,216,128a88.85,88.85,0,0,0-1.22-14.68,8,8,0,1,1,15.78-2.64ZM128,152a32,32,0,1,0-32-32A32,32,0,0,0,128,152Zm0,64a87.57,87.57,0,0,0,53.92-18.5,64,64,0,0,0-107.84,0A87.57,87.57,0,0,0,128,216Z"
              ></path>
            </svg>
          </a>

          <div class="avatar-wrapper"></div>

          <div class="form-area">
            <div class="field-group">
              <label class="field-label">E-mail</label>
              <input
                type="email"
                class="field-input"
                placeholder="tucorreo@email.com"
              />
            </div>
            <div class="field-group">
              <label class="field-label">Password</label>
              <input
                type="password"
                class="field-input"
                placeholder="••••••••"
              />
            </div>
            <button class="btn-ready">READY</button>
          </div>

          <div class="home-indicator"></div>
        </div>
      </div>

      <div class="btn-volume-up"></div>
      <div class="btn-volume-down"></div>
      <div class="btn-power"></div>
    </div>
  </body>
</html>
